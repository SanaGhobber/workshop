<div class="container">
  <div class="row">
    <input type="text" [(ngModel)]="searchTerm" placeholder="Rechercher par adresse" style="margin-bottom: 20px; width: 100%; padding: 8px;"/>
    <div *ngFor="let residence of filteredResidences" class="col-md-4" style="margin-bottom: 20px;">
      <h3>{{ residence.name }}</h3>
      <img [src]="residence.image" width="100">
      <p>
        Status: 
        <span *ngIf="residence.status === 'Disponible'" style="color: green;">&#10004; Disponible</span>
        <span *ngIf="residence.status === 'En Construction'" style="color: orange;">&#9888; En Construction</span>
        <span *ngIf="residence.status === 'Vendu'" style="color: red;">&#10060; Vendu</span>
      </p>
      <button type="button" class="btn btn-secondary" (click)="showLocation(residence)">show location</button>
      <button type="button" class="btn btn-success" (click)="addToFavorites(residence)" style="margin-left: 10px;">like</button>
      <button type="button" class="btn btn-success" (click)="goToDetail(residence.id)" style="margin-left: 10px;">detail</button>
      <a routerLink="apartmentByRes">appartement list</a>

    </div>
  </div>
</div>
