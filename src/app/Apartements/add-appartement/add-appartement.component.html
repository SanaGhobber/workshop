<form [formGroup]="apartForm" (ngSubmit)="onSubmit()">
  <div class="mb-3">
    <label for="apartmentNumber" class="form-label">Apartment Number</label>
    <input type="text" class="form-control" id="apartmentNumber" formControlName="apartmentNumber">
    <div *ngIf="apartForm.get('apartmentNumber')?.invalid && (apartForm.get('apartmentNumber')?.dirty || apartForm.get('apartmentNumber')?.touched)" class="text-danger">
      <div *ngIf="apartForm.get('apartmentNumber')?.errors?.['required']">Apartment Number is required.</div>
      <div *ngIf="apartForm.get('apartmentNumber')?.errors?.['pattern']">Apartment Number must be a number.</div>
    </div>
  </div>

  <div class="mb-3">
    <label for="floorNumber" class="form-label">Floor Number</label>
    <input type="text" class="form-control" id="floorNumber" formControlName="floorNumber">
    <div *ngIf="apartForm.get('floorNumber')?.invalid && (apartForm.get('floorNumber')?.dirty || apartForm.get('floorNumber')?.touched)" class="text-danger">
      <div *ngIf="apartForm.get('floorNumber')?.errors?.['required']">Floor Number is required.</div>
      <div *ngIf="apartForm.get('floorNumber')?.errors?.['pattern']">Floor Number must be a number.</div>
    </div>
  </div>

  <div class="mb-3">
    <label for="surface" class="form-label">Surface</label>
    <input type="text" class="form-control" id="surface" formControlName="surface">
    <div *ngIf="apartForm.get('surface')?.invalid && (apartForm.get('surface')?.dirty || apartForm.get('surface')?.touched)" class="text-danger">
      <div *ngIf="apartForm.get('surface')?.errors?.['required']">Surface is required.</div>
    </div>
  </div>

  <div class="mb-3">
    <label class="form-label d-block">Terrace</label>
    <div class="form-check form-check-inline">
      <input class="form-check-input" type="radio" id="terraceYes" value="yes" formControlName="terrace">
      <label class="form-check-label" for="terraceYes">Yes</label>
    </div>
    <div class="form-check form-check-inline">
      <input class="form-check-input" type="radio" id="terraceNo" value="no" formControlName="terrace">
      <label class="form-check-label" for="terraceNo">No</label>
    </div>
  </div>

  <div class="mb-3" *ngIf="apartForm.get('terrace')?.value === 'yes'">
    <label for="surfaceTerrace" class="form-label">Surface Terrace</label>
    <input type="text" class="form-control" id="surfaceTerrace" formControlName="surfaceTerrace">
    <div *ngIf="apartForm.get('surfaceTerrace')?.invalid && (apartForm.get('surfaceTerrace')?.dirty || apartForm.get('surfaceTerrace')?.touched)" class="text-danger">
      <div *ngIf="apartForm.get('surfaceTerrace')?.errors?.['required']">Surface Terrace is required.</div>
    </div>
  </div>

  <div class="mb-3">
    <label class="form-label d-block">Category</label>
    <div class="form-check form-check-inline">
      <input class="form-check-input" type="radio" id="s1" value="s+1" formControlName="category">
      <label class="form-check-label" for="s1">S+1</label>
    </div>
    <div class="form-check form-check-inline">
      <input class="form-check-input" type="radio" id="s2" value="s+2" formControlName="category">
      <label class="form-check-label" for="s2">S+2</label>
    </div>
    <div class="form-check form-check-inline">
      <input class="form-check-input" type="radio" id="s3" value="s+3" formControlName="category">
      <label class="form-check-label" for="s3">S+3</label>
    </div>
    <div *ngIf="apartForm.get('category')?.invalid && (apartForm.get('category')?.dirty || apartForm.get('category')?.touched)" class="text-danger">
      <div *ngIf="apartForm.get('category')?.errors?.['required']">Category is required.</div>
    </div>
  </div>

  <div class="d-flex justify-content-end">
    <button type="submit" class="btn btn-primary me-2" [disabled]="apartForm.invalid">Add</button>
    <button type="reset" class="btn btn-secondary" (click)="apartForm.reset({ terrace: 'no' })">Reset</button>
  </div>
</form>
